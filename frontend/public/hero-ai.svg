<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="800" y2="600">
<stop stop-color="#4F46E5"/>
<stop offset="1" stop-color="#06B6D4"/>
</linearGradient>

<linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
<stop stop-color="white"/>
<stop offset="1" stop-color="#EEF2FF"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".25"/>
</filter>

</defs>

<!-- Background -->

<rect width="800" height="600" rx="40" fill="url(#bg)"/>

<!-- Decorative circles -->

<circle cx="120" cy="120" r="70" fill="white" opacity=".08"/>

<circle cx="700" cy="480" r="90" fill="white" opacity=".08"/>

<circle cx="680" cy="120" r="35" fill="white" opacity=".12"/>

<!-- Main Card -->

<g filter="url(#shadow)">

<rect
x="180"
y="90"
width="440"
height="420"
rx="28"
fill="url(#card)"
/>

</g>

<!-- Header -->

<rect
x="220"
y="125"
width="250"
height="22"
rx="8"
fill="#4F46E5"
/>

<rect
x="220"
y="165"
width="330"
height="10"
rx="5"
fill="#CBD5E1"
/>

<rect
x="220"
y="185"
width="290"
height="10"
rx="5"
fill="#E2E8F0"
/>

<!-- AI Brain -->

<circle
cx="400"
cy="290"
r="72"
fill="#EEF2FF"
stroke="#4F46E5"
stroke-width="5"
/>

<!-- Brain Nodes -->

<circle cx="370" cy="260" r="8" fill="#4F46E5"/>
<circle cx="430" cy="260" r="8" fill="#4F46E5"/>
<circle cx="360" cy="315" r="8" fill="#4F46E5"/>
<circle cx="440" cy="320" r="8" fill="#4F46E5"/>
<circle cx="400" cy="350" r="8" fill="#4F46E5"/>

<!-- Connections -->

<line x1="370" y1="260" x2="430" y2="260" stroke="#4F46E5" stroke-width="3"/>

<line x1="370" y1="260" x2="360" y2="315" stroke="#4F46E5" stroke-width="3"/>

<line x1="430" y1="260" x2="440" y2="320" stroke="#4F46E5" stroke-width="3"/>

<line x1="360" y1="315" x2="400" y2="350" stroke="#4F46E5" stroke-width="3"/>

<line x1="440" y1="320" x2="400" y2="350" stroke="#4F46E5" stroke-width="3"/>

<!-- Floating Document -->

<rect
x="560"
y="170"
width="90"
height="120"
rx="16"
fill="white"
stroke="#4F46E5"
stroke-width="3"
/>

<rect x="580" y="195" width="50" height="8" rx="4" fill="#4F46E5"/>

<rect x="580" y="220" width="40" height="6" rx="3" fill="#CBD5E1"/>

<rect x="580" y="238" width="55" height="6" rx="3" fill="#CBD5E1"/>

<rect x="580" y="256" width="45" height="6" rx="3" fill="#CBD5E1"/>

<!-- Search -->

<circle
cx="170"
cy="390"
r="35"
stroke="white"
stroke-width="8"
/>

<line
x1="195"
y1="415"
x2="225"
y2="445"
stroke="white"
stroke-width="8"
stroke-linecap="round"
/>

<!-- Bottom Bars -->

<rect
x="220"
y="420"
width="320"
height="12"
rx="6"
fill="#CBD5E1"
/>

<rect
x="220"
y="445"
width="270"
height="12"
rx="6"
fill="#E2E8F0"
/>

</svg>